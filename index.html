<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --blush: #fce8e4;
  --petal: #f9d5cc;
  --peach: #f4b8a8;
  --rose: #e89485;
  --silver: #c8cdd6;
  --silver-light: #e8eaf0;
  --mist: #d0d4de;
  --ink: #3a3540;
  --soft: #8a8698;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Raleway', sans-serif;
  background: var(--white);
  color: var(--ink);
  overflow-x: hidden;
  cursor: none;
}

/* ── Custom cursor ── */
.cursor {
  position: fixed; width: 8px; height: 8px; border-radius: 50%;
  background: var(--peach); pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
}
.cursor-trail {
  position: fixed; width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--silver); pointer-events: none; z-index: 9998;
  transform: translate(-50%, -50%); opacity: 0.6;
}

/* ── Sparkle particles ── */
.particle {
  position: fixed; pointer-events: none; z-index: 9997;
  border-radius: 50%; opacity: 0;
  animation: particle-fade 1.2s ease-out forwards;
}
@keyframes particle-fade {
  0%   { opacity: 0.7; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
}

/* ── Hero ── */
#hero {
  position: relative; min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  background: linear-gradient(160deg, #fff 0%, #fef4f1 40%, #f8eef5 80%, #eef0f8 100%);
}

.blob {
  position: absolute; border-radius: 50%;
  filter: blur(60px); opacity: 0.45; pointer-events: none;
  animation: blob-drift ease-in-out infinite alternate;
}
.blob-1 { width: 520px; height: 520px; background: #fdd5cc; top: -10%; left: -12%; animation-duration: 14s; }
.blob-2 { width: 380px; height: 380px; background: #e8e4f5; bottom: -8%; right: -10%; animation-duration: 18s; animation-delay: -4s; }
.blob-3 { width: 280px; height: 280px; background: #fce2d8; top: 30%; right: 8%; animation-duration: 11s; animation-delay: -7s; }
.blob-4 { width: 200px; height: 200px; background: #d8e2f5; bottom: 20%; left: 10%; animation-duration: 15s; animation-delay: -2s; }
@keyframes blob-drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(30px,24px) scale(1.06); }
}

.shimmer-ring {
  position: absolute; border-radius: 50%; pointer-events: none;
  border: 1px solid rgba(200,205,214,0.4);
  animation: ring-pulse ease-in-out infinite;
}
.ring-1 { width: 320px; height: 320px; animation-duration: 6s; }
.ring-2 { width: 480px; height: 480px; animation-duration: 8s; animation-delay: -2s; border-color: rgba(244,184,168,0.25); }
.ring-3 { width: 640px; height: 640px; animation-duration: 10s; animation-delay: -5s; border-color: rgba(200,205,214,0.18); }
@keyframes ring-pulse {
  0%,100% { transform: scale(1); opacity: 0.5; }
  50%      { transform: scale(1.04); opacity: 1; }
}

.petal {
  position: absolute; pointer-events: none;
  background: radial-gradient(ellipse at 40% 30%, #fce8e4, #f4b8a8);
  border-radius: 50% 50% 50% 0;
  opacity: 0; animation: petal-fall linear infinite;
}
@keyframes petal-fall {
  0%   { opacity: 0; transform: translate(0,-20px) rotate(0deg); }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.3; }
  100% { opacity: 0; transform: translate(var(--sway), 110vh) rotate(360deg); }
}

.hero-content { position: relative; z-index: 2; text-align: center; }
.name-wrap { position: relative; display: inline-block; }

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(5rem, 16vw, 13rem);
  font-weight: 300; line-height: 1;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #c8a8b8 0%, #b8b0d0 30%, #c8cdd6 55%, #e8b0a0 80%, #d4a0c0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: name-shimmer 6s ease-in-out infinite alternate;
  background-size: 200% 200%;
}
@keyframes name-shimmer {
  0%   { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

.scroll-hint {
  position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  opacity: 0; animation: fade-up 1s ease forwards 2s; z-index: 2;
}
.scroll-hint span { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mist); }
.scroll-line {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, var(--peach), transparent);
  animation: scroll-drop 2s ease-in-out infinite;
}
@keyframes scroll-drop {
  0%,100% { transform: scaleY(0); transform-origin: top; opacity: 0; }
  30%      { transform: scaleY(1); transform-origin: top; opacity: 1; }
  70%      { transform: scaleY(1); transform-origin: bottom; opacity: 1; }
  100%     { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
}
@keyframes fade-up { to { opacity: 1; transform: translateY(0); } }

/* ── Bird ── */
#bird-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 50; overflow: hidden;
}
.bird { position: absolute; opacity: 0; transform: translate(-50%,-50%); }

/* ── Second section ── */
#second {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #fef4f1 0%, #f8f0f8 50%, #eef0fb 100%);
  position: relative; overflow: hidden;
}
#second-canvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1;
}
.star {
  position: absolute; pointer-events: none; z-index: 3;
  animation: twinkle ease-in-out infinite;
}
.star::before, .star::after {
  content: ''; position: absolute; background: var(--silver); border-radius: 2px;
}
.star::before { width: 1px; height: 10px; left: 50%; top: 50%; transform: translate(-50%,-50%); }
.star::after  { width: 10px; height: 1px; left: 50%; top: 50%; transform: translate(-50%,-50%); }
@keyframes twinkle {
  0%,100% { opacity: 0; transform: scale(0.6) rotate(0deg); }
  50%      { opacity: 0.8; transform: scale(1) rotate(45deg); }
}

.second-content {
  position: relative; z-index: 2;
  text-align: center;
  max-width: 580px; padding: 0 2rem;
}

/* Greeting */
.greeting {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 300; font-style: italic;
  color: var(--ink); letter-spacing: 0.01em;
  opacity: 0; transform: translateY(30px);
  transition: opacity 0.9s ease, transform 0.9s cubic-bezier(0.16,1,0.3,1);
}
.greeting.up { opacity: 1; transform: translateY(0); }

/* Arrow */
.arrow-wrap {
  margin-top: 2.2rem;
  display: flex; justify-content: center;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.7s ease 0.5s, transform 0.7s ease 0.5s;
}
.arrow-wrap.up { opacity: 1; transform: translateY(0); }

.arrow-btn {
  cursor: none;
  width: 46px; height: 46px; border-radius: 50%;
  border: 1px solid var(--mist);
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(6px);
  transition: border-color 0.3s, background 0.3s, transform 0.3s;
  position: relative; overflow: hidden;
}
.arrow-btn::before {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle at center, rgba(244,184,168,0.35), transparent 70%);
  opacity: 0; transition: opacity 0.3s;
}
.arrow-btn:hover::before { opacity: 1; }
.arrow-btn:hover { border-color: var(--peach); transform: scale(1.12); }
.arrow-btn svg {
  width: 16px; height: 16px;
  transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
.arrow-btn:hover svg { transform: translateY(2px); }
.arrow-btn.open svg  { transform: rotate(180deg) !important; }

/* Bio reveal */
.bio-panel {
  overflow: hidden;
  max-height: 0; opacity: 0;
  transition: max-height 1.1s cubic-bezier(0.16,1,0.3,1), opacity 0.7s ease;
}
.bio-panel.open { max-height: 260px; opacity: 1; }

.bio-inner { padding-top: 1.9rem; }

.bio-line {
  font-size: clamp(0.88rem, 2vw, 1.05rem);
  font-weight: 300; color: var(--soft);
  letter-spacing: 0.1em; line-height: 2.1;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1);
}
.bio-panel.open .bio-line:nth-child(1) { opacity:1; transform:translateY(0); transition-delay:0.15s; }
.bio-panel.open .bio-line:nth-child(2) { opacity:1; transform:translateY(0); transition-delay:0.30s; }
.bio-panel.open .bio-line:nth-child(3) { opacity:1; transform:translateY(0); transition-delay:0.45s; }

/* burst layer */
#burst-layer { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
</style>
</head>
<body>

<div class="cursor" id="cur"></div>
<div class="cursor-trail" id="trail"></div>
<div id="burst-layer"></div>

<!-- Bird -->
<div id="bird-container">
  <div class="bird" id="bird">
    <svg id="bird-svg" width="80" height="50" viewBox="0 0 64 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="32" cy="24" rx="16" ry="7" fill="url(#body-grad)" opacity="0.95"/>
      <path d="M16 24 Q8 28 4 32 Q10 26 16 26Z" fill="url(#wing-grad)" opacity="0.8"/>
      <g id="lw">
        <path d="M28 22 Q20 10 10 8 Q18 16 24 22Z" fill="url(#wing-grad)"/>
        <path d="M28 22 Q22 6 14 2 Q20 12 26 20Z" fill="url(#wing-grad2)" opacity="0.7"/>
      </g>
      <g id="rw">
        <path d="M36 22 Q44 10 54 8 Q46 16 40 22Z" fill="url(#wing-grad)"/>
        <path d="M36 22 Q42 6 50 2 Q44 12 38 20Z" fill="url(#wing-grad2)" opacity="0.7"/>
      </g>
      <ellipse cx="44" cy="22" rx="6" ry="5" fill="url(#body-grad)"/>
      <circle cx="46" cy="20.5" r="1.2" fill="rgba(100,95,120,0.6)"/>
      <path d="M50 22 L54 21 L50 23Z" fill="#e8b0a8" opacity="0.8"/>
      <defs>
        <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e8eaf0"/>
          <stop offset="50%" stop-color="#c8cdd6"/>
          <stop offset="100%" stop-color="#b8b4cc"/>
        </linearGradient>
        <linearGradient id="wing-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#dde0ea"/>
          <stop offset="100%" stop-color="#c0c4d4"/>
        </linearGradient>
        <linearGradient id="wing-grad2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f0f2f8" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#d4d8e8" stop-opacity="0.5"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
</div>

<!-- Hero -->
<section id="hero">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="shimmer-ring ring-1"></div>
  <div class="shimmer-ring ring-2"></div>
  <div class="shimmer-ring ring-3"></div>
  <div class="hero-content">
    <div class="name-wrap"><h1>hello!</h1></div>
  </div>
  <div class="scroll-hint">
    <span>more</span>
    <div class="scroll-line"></div>
  </div>
</section>

<!-- Second section -->
<section id="second">
  <canvas id="second-canvas"></canvas>
  <div class="second-content" id="second-content">
    <p class="greeting" id="greeting">hi, i'm ellie</p>

    <div class="arrow-wrap" id="arrow-wrap">
      <button class="arrow-btn" id="arrow-btn" aria-label="Learn more">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 3v10M3 8l5 5 5-5" stroke="#c8cdd6" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="bio-panel" id="bio-panel">
      <div class="bio-inner">
        <p class="bio-line">17 &nbsp;·&nbsp; DC area</p>
        <p class="bio-line">hs student</p>
       <p class="bio-line" style="font-style:italic;color:#db9881;">i like learning new things (like this i guess)</p>
      </div>
    </div>
  </div>
</section>

<script>
// ── Slow wheel scroll ──────────────────────────────────────
let targetScroll = window.scrollY;
let currentScroll = window.scrollY;
let ticking = false;

window.addEventListener('wheel', e => {
  e.preventDefault();
  targetScroll = Math.max(0,
    Math.min(document.body.scrollHeight - window.innerHeight,
    targetScroll + e.deltaY * 0.32));
  if (!ticking) { ticking = true; smoothStep(); }
}, { passive: false });

function smoothStep() {
  currentScroll += (targetScroll - currentScroll) * 0.1;
  if (Math.abs(targetScroll - currentScroll) < 0.4) {
    currentScroll = targetScroll; ticking = false;
  }
  window.scrollTo(0, currentScroll);
  if (ticking) requestAnimationFrame(smoothStep);
}

// ── Cursor ─────────────────────────────────────────────────
const cur = document.getElementById('cur');
const trail = document.getElementById('trail');
let mx = window.innerWidth/2, my = window.innerHeight/2, tx = mx, ty = my;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx+'px'; cur.style.top = my+'px';
});
(function trailLoop() {
  tx += (mx-tx)*0.1; ty += (my-ty)*0.1;
  trail.style.left = tx+'px'; trail.style.top = ty+'px';
  requestAnimationFrame(trailLoop);
})();

// click sparkles
document.addEventListener('click', e => {
  for (let i=0;i<8;i++){
    const p=document.createElement('div'); p.className='particle';
    const sz=4+Math.random()*6, ang=(Math.PI*2/8)*i+Math.random()*0.4, d=30+Math.random()*40;
    p.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${sz}px;height:${sz}px;
      background:hsl(${330+Math.random()*60},${40+Math.random()*30}%,${80+Math.random()*15}%);
      --dx:${Math.cos(ang)*d}px;--dy:${Math.sin(ang)*d}px;
      animation-duration:${0.8+Math.random()*0.6}s;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1400);
  }
});

// ── Petals ─────────────────────────────────────────────────
const hero = document.getElementById('hero');
for(let i=0;i<18;i++){
  const el=document.createElement('div'); el.className='petal';
  const sz=5+Math.random()*7;
  el.style.cssText=`left:${Math.random()*100}%;top:-20px;
    width:${sz}px;height:${sz*1.5}px;
    transform:rotate(${Math.random()*360}deg);
    animation-delay:${Math.random()*12}s;animation-duration:${8+Math.random()*10}s;
    --sway:${(Math.random()-.5)*120}px;`;
  hero.appendChild(el);
}

// ── Canvas orbs ────────────────────────────────────────────
const canvas=document.getElementById('second-canvas');
const ctx=canvas.getContext('2d');
const secondEl=document.getElementById('second');
function resize(){ canvas.width=secondEl.offsetWidth; canvas.height=secondEl.offsetHeight; }
resize(); window.addEventListener('resize',resize);

const orbs=Array.from({length:7},(_,i)=>({
  x:Math.random()*canvas.width, y:Math.random()*canvas.height,
  r:80+Math.random()*160,
  vx:(Math.random()-.5)*0.35, vy:(Math.random()-.5)*0.35,
  hue:[340,280,220,355,260,200,310][i], alpha:0.07+Math.random()*0.09
}));
(function drawOrbs(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const o of orbs){
    o.x+=o.vx; o.y+=o.vy;
    if(o.x<-o.r) o.x=canvas.width+o.r;
    if(o.x>canvas.width+o.r) o.x=-o.r;
    if(o.y<-o.r) o.y=canvas.height+o.r;
    if(o.y>canvas.height+o.r) o.y=-o.r;
    const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
    g.addColorStop(0,`hsla(${o.hue},55%,85%,${o.alpha})`);
    g.addColorStop(1,`hsla(${o.hue},40%,90%,0)`);
    ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }
  requestAnimationFrame(drawOrbs);
})();

// Stars
for(let i=0;i<24;i++){
  const s=document.createElement('div'); s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;
    animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s;
    transform:scale(${0.5+Math.random()*0.8});`;
  secondEl.appendChild(s);
}

// ── Bird: real rAF loop with timestamp-based flap ──────────
const bird=document.getElementById('bird');
const heroEl=document.getElementById('hero');
const lw=document.getElementById('lw');
const rw=document.getElementById('rw');
const birdSvg=document.getElementById('bird-svg');

setTimeout(()=>{ bird.style.transition='opacity 1.2s ease'; bird.style.opacity='1'; },600);

let prevTs=0, flapPhase=0;

function birdLoop(ts){
  const dt=Math.min(ts-prevTs, 50); // cap delta so tab-switch doesn't spike
  prevTs=ts;

  const scroll=window.scrollY;
  const heroH=heroEl.offsetHeight;
  const progress=Math.min(scroll/heroH, 1);

  // Flap: always ticking, faster when flying away
  const flapSpeed=0.003 + progress*0.015;
  flapPhase += flapSpeed*dt;
  const amp=9 + progress*28;
  const angle=Math.sin(flapPhase)*amp;
  if(lw) lw.setAttribute('transform',`rotate(${angle},28,22)`);
  if(rw) rw.setAttribute('transform',`rotate(${-angle},36,22)`);

  // Silver wings
  const wPaths=birdSvg.querySelectorAll('#lw path,#rw path');
  const r=Math.round(221+progress*34), g2=Math.round(224+progress*31), b=Math.round(234+progress*21);
  wPaths.forEach(p=>p.style.fill=`rgb(${r},${g2},${b})`);
  birdSvg.style.filter = progress>0.55
    ? `drop-shadow(0 0 ${((progress-.55)*28).toFixed(1)}px rgba(215,220,240,0.95))`
    : 'drop-shadow(0 2px 8px rgba(200,205,214,0.5))';

  // Position & fade
  const bx=window.innerWidth*0.5 + progress*window.innerWidth*0.38;
  const by=window.innerHeight*0.45 - progress*window.innerHeight*0.55;
  const scale=1-progress*0.35;
  const tilt=progress*-18;
  const opacity=progress<0.75 ? 1 : 1-((progress-0.75)/0.25);

  bird.style.left=bx+'px'; bird.style.top=by+'px';
  bird.style.opacity=String(opacity);
  bird.style.transform=`translate(-50%,-50%) scale(${scale}) rotate(${tilt}deg)`;

  requestAnimationFrame(birdLoop);
}
requestAnimationFrame(birdLoop);

// ── Second section reveal ──────────────────────────────────
const greeting=document.getElementById('greeting');
const arrowWrap=document.getElementById('arrow-wrap');
let revealed=false;

function checkReveal(){
  if(revealed) return;
  const r=document.getElementById('second-content').getBoundingClientRect();
  if(r.top<window.innerHeight*0.72){
    revealed=true;
    greeting.classList.add('up');
    arrowWrap.classList.add('up');
  }
}
window.addEventListener('scroll',checkReveal,{passive:true});
checkReveal();

// ── Arrow click: burst + reveal bio ───────────────────────
const arrowBtn=document.getElementById('arrow-btn');
const bioPanel=document.getElementById('bio-panel');
const burstLayer=document.getElementById('burst-layer');

// inject keyframes once
const kfStyle=document.createElement('style');
kfStyle.textContent=`
  @keyframes burst-ring {
    0%   { width:6px;height:6px;opacity:1; }
    100% { width:120px;height:120px;opacity:0;margin:-57px; }
  }
  @keyframes burst-dot {
    0%   { opacity:1; transform:translate(-50%,-50%) translate(0,0) scale(1); }
    100% { opacity:0; transform:translate(-50%,-50%) translate(var(--bx),var(--by)) scale(0.15); }
  }
`;
document.head.appendChild(kfStyle);

let bioOpen=false;
arrowBtn.addEventListener('click', e=>{
  bioOpen=!bioOpen;
  arrowBtn.classList.toggle('open',bioOpen);
  bioPanel.classList.toggle('open',bioOpen);
  doBurst(e.clientX, e.clientY);
});

function doBurst(cx,cy){
  const colors=['#fce8e4','#e8eaf0','#f4b8a8','#c8cdd6','#d4c8e8','#f9d5cc'];

  // expanding ring
  const ring=document.createElement('div');
  ring.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;
    width:6px;height:6px;border-radius:50%;
    border:1.5px solid rgba(200,205,214,0.85);
    transform:translate(-50%,-50%);pointer-events:none;z-index:200;
    animation:burst-ring 0.75s cubic-bezier(0.2,0.8,0.3,1) forwards;`;
  burstLayer.appendChild(ring);
  setTimeout(()=>ring.remove(),800);

  // radial dots
  for(let i=0;i<16;i++){
    const ang=(Math.PI*2/16)*i;
    const dist=50+Math.random()*60;
    const sz=3+Math.random()*5;
    const col=colors[Math.floor(Math.random()*colors.length)];
    const dot=document.createElement('div');
    dot.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;
      width:${sz}px;height:${sz}px;border-radius:50%;background:${col};
      transform:translate(-50%,-50%);pointer-events:none;z-index:200;
      animation:burst-dot 0.65s cubic-bezier(0.2,0.8,0.3,1) ${i*0.018}s forwards;
      --bx:${Math.cos(ang)*dist}px;--by:${Math.sin(ang)*dist}px;`;
    burstLayer.appendChild(dot);
    setTimeout(()=>dot.remove(),900);
  }
}
</script>
</body>
</html>
